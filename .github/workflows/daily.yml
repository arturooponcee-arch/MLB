name: daily-pipeline

# Corre el pipeline diario a las 23:30 de CDMX. México no observa horario de
# verano desde 2022, así que CDMX es UTC-6 todo el año: 23:30 CDMX = 05:30 UTC.
on:
  schedule:
    - cron: "30 5 * * *"
  workflow_dispatch:

concurrency:
  group: daily-pipeline
  cancel-in-progress: false

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  daily:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Instalar Poetry
        run: pipx install poetry

      - name: Cache del venv
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ runner.os }}-py313-${{ hashFiles('poetry.lock') }}

      - name: Instalar dependencias
        run: |
          poetry config virtualenvs.in-project true
          poetry install --with ml,data,viz --no-interaction

      # La base DuckDB (~560 MB) persiste entre corridas vía cache de Actions.
      # Cada corrida guarda un cache nuevo (key con run_id) y la siguiente
      # restaura el más reciente vía restore-keys. GitHub evicta los viejos.
      - name: Restaurar base DuckDB
        id: db-cache
        uses: actions/cache/restore@v4
        with:
          path: database/mlb.duckdb
          key: mlb-duckdb-${{ github.run_id }}
          restore-keys: |
            mlb-duckdb-

      # Primera corrida (o cache evictado): baja el seed del release `db-seed`.
      # Ver README de despliegue: se sube una vez con `gh release create`.
      - name: Seed de la base desde release
        if: steps.db-cache.outputs.cache-matched-key == ''
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release download db-seed --pattern "mlb.duckdb.gz" --dir database
          gunzip database/mlb.duckdb.gz
          ls -lh database/

      - name: Pipeline diario
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
          # date.today() usa la zona local del runner (UTC): sin esto, una
          # corrida manual en la noche de CDMX generaría la fecha siguiente.
          TZ: America/Mexico_City
        run: poetry run mlb daily run

      - name: Guardar base DuckDB en cache
        if: success()
        uses: actions/cache/save@v4
        with:
          path: database/mlb.duckdb
          key: mlb-duckdb-${{ github.run_id }}

      - name: Publicar reportes como artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: reportes-${{ github.run_number }}
          path: reports/
          retention-days: 30

      # Dashboard con URL fija, actualizado en cada corrida:
      # https://arturooponcee-arch.github.io/MLB/
      - name: Preparar sitio para Pages
        if: success()
        run: |
          mkdir -p site
          cp reports/dashboard.html site/index.html
          if [ -d reports/daily ]; then
            cp -r reports/daily site/daily
            # Pages no lista directorios: índice con los reportes, recientes primero.
            {
              echo '<!doctype html><html lang="es"><meta charset="utf-8">'
              echo '<title>MLB Quant — Reportes diarios</title>'
              echo '<h1>Reportes diarios</h1><p><a href="../">← Dashboard</a></p><ul>'
              ls site/daily | grep -v '^index\.html$' | sort -r | while read -r f; do
                echo "<li><a href=\"$f\">$f</a></li>"
              done
              echo '</ul></html>'
            } > site/daily/index.html
          fi

      - name: Subir sitio
        if: success()
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy a GitHub Pages
        if: success()
        id: deployment
        uses: actions/deploy-pages@v4

      # No bloqueante: si falta el secret VERCEL_TOKEN o Vercel falla, no debe
      # tumbar el resto del pipeline (Pages ya se publicó arriba).
      - name: Publicar sitio en Vercel
        if: success()
        continue-on-error: true
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: team_fioYhYF0IA7PJKBqIXeZclWz
          VERCEL_PROJECT_ID: prj_MSzop0yOXuZOMhsAAiaLZyQfkBe8
        run: |
          if [ -z "$VERCEL_TOKEN" ]; then
            echo "::warning::Secret VERCEL_TOKEN no configurado: el dashboard de Vercel NO se actualizó. Agrégalo en Settings → Secrets and variables → Actions."
            exit 1
          fi
          npx --yes vercel@latest deploy site --prod --yes --token="$VERCEL_TOKEN"
